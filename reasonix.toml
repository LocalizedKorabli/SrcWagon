allow = ["explore", "Bash(where python && python --version && pip list 2>nul | findstr /i font)", "Bash(dir \"C:\\Users\\HoloI\\Documents\\dev\\lesta\\ships\\mods\\SrcWagon\\SrcWagonCHS\":*)", "Bash(python -c \"import fonttools; print(fonttools.__version__)\" 2>&1 || python -c \"import fontTools; print(fontTools.version)\" 2>&1 || echo \"fonttools not installed\")", "Bash(python -c \"\ntry:\n    from fonttools.ttLib import TTFont\n    print('fonttools OK')\nexcept ImportError:\n    print('fonttools NOT available')\ntry:\n    from fontTools.ttLib import TTFont\n    print('PIL/fontTools OK')\nexcept ImportError:\n    print('PIL fontTools NOT available')\n\")", "Bash(where /R \"C:\\Users\\HoloI\\Documents\\dev\\lesta\\ships\\mods\\SrcWagon\" SourceHanSansTW* 2>nul || echo \"No SourceHanSansTW found in project tree\")", "Bash(dir /s:*)", "Bash(where /R \"C:\\Users\\HoloI\\Documents\\dev\\lesta\\ships\" ALS* 2>nul && where /R \"C:\\Users\\HoloI\\Documents\\dev\\lesta\" Wagon* 2>nul && where /R \"C:\\ProgramData\\Lesta\" ALS* 2>nul || echo \"Trying broader search...\")", "Bash(where /R \"C:\\Users\\HoloI\\Documents\\dev\\lesta\" *.ttf 2>nul && where /R \"C:\\ProgramData\\Lesta\" *.ttf 2>nul | head -20)", "Bash(python -c \"\nfrom io import BytesIO\nimport struct\n\n# Read the current font to understand its metrics\nwith open(r'C:\\Users\\HoloI\\Documents\\dev\\lesta\\ships\\mods\\SrcWagon\\SrcWagonCHS\\SrcWagon\\Common\\res_mods\\gui\\fonts\\SourceHanSansCN_WN_Medium.ttf', 'rb') as f:\n    data = f.read()\n\n# Parse the 'head' table to get unitsPerEm\n# Parse 'OS/2' table for metrics\n# TTF/OTF font: the TrueType outline font has specific table structure\n\n# For OpenType fonts, we need to find the table directory\n# The file starts with sfVersion (4 bytes), numTables (2 bytes)\nsfversion = struct.unpack('>I', data[0:4])[0]\nnumTables = struct.unpack('>H', data[4:6])[0]\nprint(f'sfVersion: 0x{sfversion:08X}, numTables: {numTables}')\n\n# Read table directory entries\ntables = {}\nfor i in range(numTables):\n    offset = 12 + i * 16\n    tag = data[offset:offset+4].decode('ascii')\n    checksum, toffset, tlength = struct.unpack('>III', data[offset+4:offset+16])\n    tables[tag] = (toffset, tlength)\n\nprint('Tables found:', list(tables.keys()))\n\n# Read 'head' table\nif 'head' in tables:\n    off, ln = tables['head']\n    head_data = data[off:off+ln]\n    unitsPerEm = struct.unpack('>H', head_data[18:20])[0]\n    print(f'\\nhead.unitsPerEm: {unitsPerEm}')\n\n# Read 'OS/2' table for metrics\nif 'OS/2' in tables:\n    off, ln = tables['OS/2']\n    os2 = data[off:off+ln]\n    # OS/2 table version at offset 0 (2 bytes)\n    version = struct.unpack('>H', os2[0:2])[0]\n    xAvgCharWidth = struct.unpack('>h', os2[2:4])[0]\n    usWeightClass = struct.unpack('>H', os2[4:6])[0]\n    usWidthClass = struct.unpack('>H', os2[6:8])[0]\n    fsType = struct.unpack('>h', os2[8:10])[0]\n    ySubscriptXSize = struct.unpack('>h', os2[10:12])[0]\n    ySubscriptYSize = struct.unpack('>h', os2[12:14])[0]\n    ySubscriptXOffset = struct.unpack('>h', os2[14:16])[0]\n    ySubscriptYOffset = struct.unpack('>h', os2[16:18])[0]\n    ySuperscriptXSize = struct.unpack('>h', os2[18:20])[0]\n    ySuperscriptYSize = struct.unpack('>h', os2[20:22])[0]\n    ySuperscriptXOffset = struct.unpack('>h', os2[22:24])[0]\n    ySuperscriptYOffset = struct.unpack('>h', os2[24:26])[0]\n    yStrikeoutSize = struct.unpack('>h', os2[26:28])[0]\n    yStrikeoutPosition = struct.unpack('>h', os2[28:30])[0]\n    sFamilyClass = struct.unpack('>h', os2[30:32])[0]\n    \n    # Panose at 32-42 (10 bytes)\n    \n    ulUnicodeRange1 = struct.unpack('>I', os2[42:46])[0]\n    ulUnicodeRange2 = struct.unpack('>I', os2[46:50])[0]\n    ulUnicodeRange3 = struct.unpack('>I', os2[50:54])[0]\n    ulUnicodeRange4 = struct.unpack('>I', os2[54:58])[0]\n    \n    achVendID = os2[58:62].decode('ascii', errors='replace')\n    \n    fsSelection = struct.unpack('>H', os2[62:64])[0]\n    \n    usFirstCharIndex = struct.unpack('>H', os2[64:66])[0]\n    usLastCharIndex = struct.unpack('>H', os2[66:68])[0]\n    \n    sTypoAscender = struct.unpack('>h', os2[68:70])[0]\n    sTypoDescender = struct.unpack('>h', os2[70:72])[0]\n    sTypoLineGap = struct.unpack('>h', os2[72:74])[0]\n    \n    usWinAscent = struct.unpack('>H', os2[74:76])[0]\n    usWinDescent = struct.unpack('>H', os2[76:78])[0]\n    \n    print(f'\\nOS/2 Table:')\n    print(f'  version: {version}')\n    print(f'  usWeightClass: {usWeightClass}')\n    print(f'  achVendID: {achVendID}')\n    print(f'  fsSelection: {fsSelection:04x}')\n    print(f'  usFirstCharIndex: {usFirstCharIndex} (U+{usFirstCharIndex:04X})')\n    print(f'  usLastCharIndex: {usLastCharIndex} (U+{usLastCharIndex:04X})')\n    print(f'  sTypoAscender: {sTypoAscender}')\n    print(f'  sTypoDescender: {sTypoDescender}')\n    print(f'  sTypoLineGap: {sTypoLineGap}')\n    print(f'  usWinAscent: {usWinAscent}')\n    print(f'  usWinDescent: {usWinDescent}')\n    print(f'  yStrikeoutSize: {yStrikeoutSize}')\n    print(f'  yStrikeoutPosition: {yStrikeoutPosition}')\n    \n    # Also try to extract CodePage ranges if available (version 1+)\n    # For version 1+, CodePageRange is at offset 78\n    if version >= 1:\n        ulCodePageRange1 = struct.unpack('>I', os2[78:82])[0]\n        ulCodePageRange2 = struct.unpack('>I', os2[82:86])[0]\n        print(f'  ulCodePageRange1: {ulCodePageRange1:08X}')\n        print(f'  ulCodePageRange2: {ulCodePageRange2:08X}')\n    \n    # For version 4+ (offset may vary, typically 86+)\n    # sCapHeight at offset 88, usLowerOpSize at 120...\n    \n# Read 'hhea' table for horizontal metrics\nif 'hhea' in tables:\n    off, ln = tables['hhea']\n    hhea = data[off:off+ln]\n    ascent = struct.unpack('>h', hhea[4:6])[0]\n    descent = struct.unpack('>h', hhea[6:8])[0]\n    lineGap = struct.unpack('>h', hhea[8:10])[0]\n    numHMetrics = struct.unpack('>H', hhea[34:36])[0]\n    print(f'\\nhhea Table:')\n    print(f'  ascent: {ascent}')\n    print(f'  descent: {descent}')\n    print(f'  lineGap: {lineGap}')\n    print(f'  numberOfHMetrics: {numHMetrics}')\n    \n# Check name table for font names\nif 'name' in tables:\n    off, ln = tables['name']\n    name_data = data[off:off+ln]\n    fmt = struct.unpack('>H', name_data[0:2])[0]\n    count = struct.unpack('>H', name_data[2:4])[0]\n    storage_offset = struct.unpack('>H', name_data[4:6])[0]\n    print(f'\\nname Table:')\n    print(f'  format: {fmt}, count: {count}')\n    for i in range(count):\n        entry_off = 6 + i * 12\n        platformID = struct.unpack('>H', name_data[entry_off:entry_off+2])[0]\n        encodingID = struct.unpack('>H', name_data[entry_off+2:entry_off+4])[0]\n        languageID = struct.unpack('>H', name_data[entry_off+4:entry_off+6])[0]\n        nameID = struct.unpack('>H', name_data[entry_off+6:entry_off+8])[0]\n        length = struct.unpack('>H', name_data[entry_off+8:entry_off+10])[0]\n        str_offset = struct.unpack('>H', name_data[entry_off+10:entry_off+12])[0]\n        \n        # For platform 3 (Windows), encoding 1 (UCS-2) or 10 (UCS-4)\n        str_data = name_data[storage_offset+str_offset:storage_offset+str_offset+length]\n        if platformID == 3 and encodingID == 1:\n            try:\n                decoded = str_data.decode('utf-16-be')\n                print(f'  [{platformID},{encodingID},{languageID}] nameID={nameID}: {decoded}')\n            except:\n                pass\n        elif platformID == 3 and encodingID == 10:\n            try:\n                decoded = str_data.decode('utf-16-be')\n                print(f'  [{platformID},{encodingID},{languageID}] nameID={nameID}: {decoded}')\n            except:\n                pass\n        elif platformID == 1:\n            try:\n                decoded = str_data.decode('mac_roman')\n                print(f'  [{platformID},{encodingID},{languageID}] nameID={nameID}: {decoded}')\n            except:\n                pass\n\n# Check CFF table (for PostScript outlines) vs glyf (for TrueType outlines)\nif 'CFF ' in tables:\n    print(f'\\nFont type: OpenType with CFF (PostScript outlines)')\nif 'glyf' in tables:\n    print(f'\\nFont type: TrueType outlines')\n\" 2>&1)", "Bash(where /R \"C:\\Users\\HoloI\" Wagon* 2>nul || where /R \"C:\\\" ALS_Wagon* 2>nul || where /R \"C:\\\" \"ALS Wagon\"* 2>nul || echo \"Not found at root level\")", "Bash(python -c \"\n# Let's look at the user fonts directory for anything interesting\nimport os\nfontdir = os.path.expandvars(r'%LOCALAPPDATA%\\Microsoft\\Windows\\Fonts')\nfor f in sorted(os.listdir(fontdir)):\n    print(f)\n\" 2>&1)"]


