name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install py7zr

      - name: Upload to R2 & update metadata
        run: python pack_release.py --ci
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          CF_PAGES_DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}

      - name: Commit updated metadata
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dist/metadata.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore(metadata): update [skip ci]"
            git push
          fi
